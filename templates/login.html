{% extends 'base.html' %}
{% block title %}Bidder Login — Auction{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-box">
    <h1>Auction Bidding</h1>
    <p class="subtitle">Enter your paddle number and PIN to start bidding.</p>

    <form method="POST">
      <div class="form-group">
        <label for="paddle_number">Paddle Number</label>
        <input type="text" id="paddle_number" name="paddle_number"
               placeholder="e.g. 42" required autofocus>
      </div>
      <div class="form-group">
        <label for="pin">PIN</label>
        <input type="password" id="pin" name="pin"
               placeholder="Enter your PIN" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem">
        Sign In
      </button>
    </form>

    <p style="margin-top:1.5rem;font-size:0.82rem;color:#6b7280;text-align:center">
      Not registered? Contact the auction staff at the registration desk.
    </p>
  </div>
</div>
{% endblock %}
