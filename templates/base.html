<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Auction Bidding{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar">
  <a class="brand" href="{{ url_for('index') }}">Auction Bidding</a>
  <div class="nav-links">
    {% block nav_links %}{% endblock %}
  </div>
</nav>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="page" style="padding-bottom:0">
      <ul class="flash-list">
        {% for msg in messages %}
          <li class="flash">{{ msg }}</li>
        {% endfor %}
      </ul>
    </div>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</body>
</html>
